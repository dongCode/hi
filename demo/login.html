<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .content-center {
            width: 300px;
            height: 300px;
            border: 1px solid black;
            position: absolute;
            top: -150px;
            bottom: 0px;
            left: 0px;
            right: 0px;
            margin: auto;
        }
        .grey {
            background-color: grey;
        }
        .text-center {
            text-align: center;
        }
        .text-content {
            margin: 10px;
        }
    </style>
</head>
<body class="grey text-center">
<div class="content-center">
    <h1>登录</h1>
    <form action="javascript:;" method="post">
        <div class="text-content">
            <input type="username" name="username" placeholder="用户名">
        </div>
        <div>
            <input type="password" name="password" placeholder="密码">
        </div>

        <button type="submit" class="text-content"
                id="validate-submit">
            <span class="">登录</span></button>
    </form>
</div>

</body>
</html>
