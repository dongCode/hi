<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        html {
            position: relative;
            min-height: 100%;
        }
        body {
            margin-bottom: 60px;
        }
        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background-color: #f5f5f5;
            text-align: center;
            line-height: 60px;
        }
        .title {
            text-align: center;
        }
    </style>
</head>

<body>
<h1 class="title">Sticky footer</h1>
<div class="footer">footer</div>
</body>
</html>
