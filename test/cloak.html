<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>弹出层</title>
    <style>
        .hide-cloak {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(0,0,0,.4);
            z-index: 10;
        }
        .hide-box {
            background-color: #fff;
            border-radius: 8px;
            width: 600px;
            height: 200px;
            margin: auto;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        .hide-header {
            background-color: grey;
        }
        .hide-close {
            margin: 3px;
        }
        .pointer {
            cursor: pointer;
        }
        .hide-close {
            margin: 3px;
        }
        .f-right {
            float: right;
        }
        .text-center {
            text-align: center;
        }
        .text-content {
            padding: 10px;
        }
    </style>
</head>
<body>
<div id="app">
    <button @click="toggle('hideBox')">Toggle</button>
    <div class="hide-cloak" v-show="hideBox">

        <div class="hide-box">

            <span class="f-right hide-close pointer" @click="toggle('hideBox')">X</span>

            <h2 class="hide-header text-center" >修改名称</h2>
            <div class="text-content">
                <span>名称：</span>
                <input type="text"
                       v-model="name"
                       placeholder="名称"
                       style="width: 300px">
            </div>
            <div style="margin-left: 260px">
                <button @click="toggle('hideBox')">
                    确定
                </button>
                <button @click="toggle('hideBox')">取消</button>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.bootcss.com/vue/2.5.16/vue.min.js"></script>
<script>
    new Vue({

      el: '#app',

      data: {
        hideBox: false,
        name: '',

      },
      methods: {
        toggle (key) {
          this[key] = !this[key]
        }

      }
    })
</script>
</body>
</html>
